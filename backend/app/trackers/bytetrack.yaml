# ByteTrack config: longer track_buffer so the same person keeps the same ID when briefly lost
# (helps line-crossing counter see consecutive frames with same track_id)
tracker_type: bytetrack
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 60
match_thresh: 0.8
fuse_score: true
