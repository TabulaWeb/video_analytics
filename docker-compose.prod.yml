version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zaga_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-zaga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zaga} -d ${POSTGRES_DB:-zaga_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"
    volumes:
      - ./infra/mediamtx.yml:/mediamtx.yml:ro
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      ZAGA_DB_URL: postgresql://${POSTGRES_USER:-zaga}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zaga_analytics}
      ZAGA_SECRET_KEY: ${ZAGA_SECRET_KEY:?Set ZAGA_SECRET_KEY in .env}
      ZAGA_CORS_ORIGINS: https://${DOMAIN:-localhost}
      ZAGA_MEDIAMTX_API: http://mediamtx:9997
      ZAGA_MEDIAMTX_RTSP: rtsp://mediamtx:8554
      ZAGA_MEDIAMTX_HLS: http://mediamtx:8888
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ""
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
