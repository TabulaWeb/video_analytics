version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zaga_analytics
      POSTGRES_USER: zaga
      POSTGRES_PASSWORD: zaga
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zaga -d zaga_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "1935:1935"
      - "9997:9997"
    volumes:
      - ./infra/mediamtx.yml:/mediamtx.yml:ro

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ZAGA_DB_URL: postgresql://zaga:zaga@postgres:5432/zaga_analytics
      ZAGA_MEDIAMTX_API: http://mediamtx:9997
      ZAGA_MEDIAMTX_RTSP: rtsp://mediamtx:8554
      ZAGA_MEDIAMTX_HLS: http://mediamtx:8888
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
